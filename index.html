<body class="text-slate-100 antialiased">
  <main class="flex min-h-screen w-full">
    <section class="device-shell relative w-full overflow-hidden">
      <img id="heroBackdropBlur" src="" alt="" aria-hidden="true" class="img-fade hero-img-blur absolute inset-0 h-full w-full object-cover" />
      <img id="heroBackdrop" src="" alt="Фон аукционного дома" class="img-fade hero-img-main absolute inset-0 h-full w-full" />
      <div class="hero-overlay absolute inset-0"></div>
      <section class="safe-bottom absolute inset-x-0 bottom-0 z-10 flex justify-center">
        <div class="btn-wrap px-[clamp(12px,3.5vw,18px)]">
          <button id="openContacts" class="tap h-[clamp(44px,7.2vh,50px)] w-full rounded-full border border-white/10 bg-black/85 text-[clamp(16px,4.5vw,19px)] font-medium text-white">Контакты</button>
          <button id="openSocials" class="tap mt-3 h-[clamp(44px,7.2vh,50px)] w-full rounded-full bg-white px-5 text-[clamp(16px,4.2vw,18px)] font-medium text-[#202024]">Соцсети</button>
          <p id="hintTapToOpen" class="micro-hint mt-2 pb-1 text-center text-white/90">Нажмите, чтобы открыть</p>
        </div>
      </section>
    </section>
  </main>

  <div id="contactsModal" class="modal-layer fixed inset-0 z-30" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="contactsModalTitle">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" data-close="contacts"></div>
    <div class="modal-shell">
      <section class="modal-content relative" data-modal-card="contacts">
        <img id="contactsBackdrop" src="" alt="" class="absolute inset-0 h-full w-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-b from-black/62 via-black/72 to-black/86"></div>
        <div class="modal-scroll relative z-10 flex h-full flex-col">
          <header class="sticky-head flex items-center justify-between px-5 py-4">
            <h2 id="contactsModalTitle" class="font-serif text-[clamp(1.7rem,6vw,2rem)] text-[#d4c19b]">Контакты</h2>
            <button class="tap rounded-full border border-white/25 bg-black/30 p-2 text-slate-200" data-close="contacts" aria-label="Закрыть">✕</button>
          </header>
          <div class="px-4 pb-5 pt-4">
            <div class="rounded-3xl border border-[#d8c49a]/30 bg-black/45 p-[clamp(14px,3.8vw,18px)] backdrop-blur-sm">
              <p id="foundersTitle" class="mb-3 text-xs font-semibold uppercase tracking-[0.16em] text-[#d2bf98]">Основатели</p>
              <div id="foundersList" class="space-y-3"></div>
            </div>
            <div class="mt-4 rounded-3xl border border-white/15 bg-black/45 p-[clamp(14px,3.8vw,18px)] backdrop-blur-sm">
              <p id="commonContactsTitle" class="text-sm font-medium text-[#d2bf98]">Общие контакты</p>
              <a id="commonEmail" class="mt-2 block text-sm text-slate-100 underline decoration-white/45 underline-offset-4" href="#"></a>
              <p id="commonAddress" class="address-text mt-2 text-sm leading-relaxed text-slate-200/90"></p>
            </div>
            <footer class="mt-4 rounded-3xl border border-white/15 bg-black/45 p-[clamp(12px,3.4vw,16px)] text-xs text-slate-300/70 backdrop-blur-sm">
              <p id="legalCompany"></p>
              <p id="legalInn" class="mt-1"></p>
            </footer>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="socialsModal" class="modal-layer fixed inset-0 z-30" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="socialsModalTitle">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" data-close="socials"></div>
    <div class="modal-shell">
      <section class="modal-content relative" data-modal-card="socials">
        <img id="socialsBackdrop" src="" alt="" class="absolute inset-0 h-full w-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-b from-black/62 via-black/72 to-black/86"></div>
        <div class="modal-scroll relative z-10 flex h-full flex-col">
          <header class="sticky-head flex items-center justify-between px-5 py-4">
            <h2 id="socialsModalTitle" class="font-serif text-[clamp(1.7rem,6vw,2rem)] text-[#d4c19b]">Соцсети</h2>
            <button class="tap rounded-full border border-white/25 bg-black/30 p-2 text-slate-200" data-close="socials" aria-label="Закрыть">✕</button>
          </header>
          <div class="px-4 pb-5 pt-4"><ul id="socialsList" class="space-y-3"></ul></div>
        </div>
      </section>
    </div>
  </div>

  <div id="copyToast" class="copy-toast" role="status" aria-live="polite">Скопировано</div>

  <script src="./content.js"></script>
  <script src="./app.min.js"></script>
